<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            color: #333;
            overflow-x: hidden;
        }

        /* ====== LOADING SCREEN ====== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 1s ease-in-out 2.5s forwards;
        }

        .beating-heart {
            font-size: 80px;
            animation: heartBeat 1.2s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* ====== FALLING HEARTS ====== */
        .heart-rain {
            position: fixed;
            top: -100px;
            left: 50%;
            font-size: 30px;
            opacity: 0.6;
            pointer-events: none;
            animation: fall 8s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ====== NAVBAR ====== */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(219, 112, 147, 0.1);
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #c084a8;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-btn:hover {
            color: #d946a6;
            transform: scale(1.1);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #d946a6 0%, #ec4899 100%);
            color: white;
            box-shadow: 0 0 20px rgba(217, 70, 166, 0.5);
        }

        /* ====== HOME SECTION ====== */
        .section {
            display: none;
            min-height: 100vh;
            padding: 80px 40px;
        }

        .section.active {
            display: flex;
        }

        #home {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            position: relative;
            overflow: hidden;
        }

        .home-content {
            text-align: center;
            animation: fadeInUp 1s ease-out 0.5s both;
            z-index: 10;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, #d946a6 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(217, 70, 166, 0.2);
            animation: slideDown 1s ease-out 0.5s both;
        }

        .subtitle {
            font-size: 24px;
            color: #c084a8;
            margin-bottom: 40px;
            font-weight: 300;
            animation: fadeIn 1s ease-out 1s both;
        }

        .open-btn {
            background: linear-gradient(135deg, #d946a6 0%, #ec4899 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(217, 70, 166, 0.3);
            animation: fadeIn 1s ease-out 1.5s both;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(217, 70, 166, 0.5);
        }

        .open-btn:active {
            transform: translateY(0);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ====== LETTER SECTION ====== */
        #letter {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
        }

        .letter-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 50px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(217, 70, 166, 0.2);
            border: 2px solid rgba(217, 70, 166, 0.1);
            animation: popIn 0.6s ease-out;
        }

        .letter-title {
            font-family: 'Dancing Script', cursive;
            font-size: 48px;
            color: #d946a6;
            margin-bottom: 30px;
            text-align: center;
        }

        .letter-text {
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            color: #555;
            line-height: 1.8;
            text-align: left;
            min-height: 300px;
        }

        .letter-text::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ====== MUSIC PLAYER ====== */
        .music-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #d946a6 0%, #ec4899 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(217, 70, 166, 0.3);
            transition: all 0.3s ease;
            z-index: 50;
            opacity: 0.7;
        }

        .music-player:hover {
            opacity: 1;
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(217, 70, 166, 0.5);
        }

        .music-icon {
            font-size: 30px;
            color: white;
        }

        .visualizer {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
        }

        .bar {
            width: 3px;
            height: 15px;
            background: white;
            border-radius: 2px;
            animation: visualize 0.6s ease-in-out infinite;
        }

        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }

        @keyframes visualize {
            0%, 100% { height: 8px; }
            50% { height: 20px; }
        }

        /* ====== AUDIO ELEMENT ====== */
        audio {
            display: none;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
                gap: 20px;
            }

            .nav-btn {
                font-size: 14px;
                padding: 8px 15px;
            }

            .main-title {
                font-size: 48px;
            }

            .subtitle {
                font-size: 18px;
            }

            .letter-card {
                padding: 40px 30px;
            }

            .letter-title {
                font-size: 36px;
            }

            .letter-text {
                font-size: 18px;
                min-height: 200px;
            }

            .music-player {
                width: 60px;
                height: 60px;
                bottom: 20px;
                right: 20px;
            }

            .music-icon {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .section {
                padding: 60px 20px;
            }

            .main-title {
                font-size: 36px;
            }

            .subtitle {
                font-size: 16px;
            }

            .open-btn {
                padding: 15px 35px;
                font-size: 16px;
            }

            .letter-card {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .letter-title {
                font-size: 28px;
            }

            .letter-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="beating-heart">❤️</div>
    </div>

    <!-- Navigation Bar -->
    <nav>
        <button class="nav-btn active" onclick="showSection('home')">🏠 Home</button>
        <button class="nav-btn" onclick="showSection('letter')">💌 Letter</button>
    </nav>

    <!-- HOME SECTION -->
    <section id="home" class="section active">
        <div class="home-content">
            <h1 class="main-title">Happy Mother's Day Inay!</h1>
            <p class="subtitle">To the most wonderful mom in the world</p>
            <button class="open-btn" onclick="showSection('letter')">💌 Open My Message</button>
        </div>
    </section>

    <!-- LETTER SECTION -->
    <section id="letter" class="section">
        <div class="letter-card">
            <h2 class="letter-title">Dear Inay ❤️</h2>
            <div class="letter-text" id="letterContent"></div>
        </div>
    </section>

    <!-- Music Player -->
    <div class="music-player" onclick="toggleMusic()">
        <div class="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <span class="music-icon" id="musicIcon">🎵</span>
    </div>

    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <source src="SB19 - MAPA (Lyrics) - (320 Kbps).mp3" type="audio/mpeg">
    </audio>

    <script>
        // ====== LETTER TEXT WITH TYPEWRITER EFFECT ======
        const letterText = ` Happy Mother's Day, Inay! Thank you sa walang sawang suporta mo sa akin at sa inyo ni tito, alam ko na kahit marami kayong financial problem hindi nyo ako pinapabayaan lalo na kapag may mga bayarin. Gusto ko lang malaman nyo na kahit nagiging pasaway ako, mahal na mahal ko kayo at gusto ko lang din malaman mo na sobrang swerte ko sayo at sobrang na-aappreciate kita inay! Salamat sa lahat at 'wag kayong mag-alala dahil pare parehas tayong aangat sa buhay kapag naging stable na ako at ako naman ang babawi sa mga ginawa nyong sakripisyo sa akin. I love you inay and Happy happy Mother's Day!💕`;

        let currentIndex = 0;
        let isTyping = false;

        // ====== FALLING HEARTS EFFECT ======
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-rain';
            heart.textContent = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 8000);
        }

        // Create falling hearts every 500ms
        setInterval(createFallingHeart, 500);

        // ====== SECTION NAVIGATION ======
        function showSection(sectionId) {
            // Hide all sections
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });

            // Hide all nav buttons active state
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected section
            document.getElementById(sectionId).classList.add('active');

            // Add active state to button
            event.target.classList.add('active');

            // Start typewriter effect when letter section is opened
            if (sectionId === 'letter') {
                startTypewriter();
            }
        }

        // ====== TYPEWRITER EFFECT ======
        function startTypewriter() {
            if (isTyping) return;
            isTyping = true;
            currentIndex = 0;
            document.getElementById('letterContent').textContent = '';

            typeCharacter();
        }

        function typeCharacter() {
            if (currentIndex < letterText.length) {
                document.getElementById('letterContent').textContent += letterText[currentIndex];
                currentIndex++;
                setTimeout(typeCharacter, 30);
            } else {
                isTyping = false;
            }
        }

        // ====== MUSIC PLAYER ======
        let isPlaying = false;

        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const musicIcon = document.getElementById('musicIcon');

            if (isPlaying) {
                audio.pause();
                musicIcon.textContent = '🎵';
                isPlaying = false;
            } else {
                audio.play();
                musicIcon.textContent = '🔊';
                isPlaying = true;
            }
        }

        // Auto-play music when page loads
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('bgMusic').play();
                document.getElementById('musicIcon').textContent = '🔊';
                isPlaying = true;
            }, 2500);
        });

        // ====== SMOOTH SCROLLING ======
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // ====== INITIAL TYPEWRITER ON LETTER SECTION ======
        // The typewriter will start when user clicks on Letter tab
    </script>
</body>
</html>
